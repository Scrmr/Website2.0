<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Life — IgnasZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        .topbar {
            background: #0a0a0a;
            border-bottom: 1px solid #1e1e1e;
            padding: 12px 20px;
        }
        .topbar a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .topbar a:hover { color: #e0e0e0; }
        .page-header {
            text-align: center;
            padding: 32px 20px 16px;
        }
        .page-header h1 { margin: 0 0 8px; font-size: 1.6rem; }
        .page-header p { margin: 0; color: #888; font-size: 0.9rem; }
        .canvas-wrapper {
            overflow-x: auto;
            display: flex;
            justify-content: center;
            padding: 0 16px;
        }
        #gameCanvas {
            background-color: #fff;
            border: 1px solid #333;
            cursor: crosshair;
            display: block;
        }
        #controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 16px;
            max-width: 800px;
            margin: 0 auto;
        }
        button, select, input[type=range], input[type=color] {
            background: #222;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
        }
        button:hover { border-color: #555; background: #2a2a2a; }
        label { font-size: 0.85rem; color: #aaa; }
        input[type=color] { padding: 2px 4px; width: 40px; height: 30px; }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="../index.html">← IgnasZ</a>
    </div>

    <div class="page-header">
        <h1>Game of Finite Life</h1>
        <p>Two-player Conway's Game of Life. Draw cells, then start the simulation.</p>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="1000" height="1000"></canvas>
    </div>

    <div id="controls">
        <button id="startButton">Start</button>
        <button id="stopButton">Stop</button>
        <button id="resetButton">Reset</button>

        <label for="speedSlider">Speed:</label>
        <input type="range" id="speedSlider" min="50" max="1000" value="200">

        <label for="gridSizeSelect">Grid:</label>
        <select id="gridSizeSelect">
            <option value="10">Small (100×100)</option>
            <option value="5">Medium (200×200)</option>
            <option value="3">Large (333×333)</option>
        </select>

        <label for="brushSizeSelect">Brush:</label>
        <select id="brushSizeSelect">
            <option value="1">1×1</option>
            <option value="3">3×3</option>
            <option value="5">5×5</option>
            <option value="10">10×10 (Random)</option>
            <option value="20">20×20 (Random)</option>
        </select>

        <label for="player1Color">P1:</label>
        <input type="color" id="player1Color" value="#ff0000">

        <label for="player2Color">P2:</label>
        <input type="color" id="player2Color" value="#0000ff">
    </div>

    <script src="gameOfLife.js"></script>
</body>
</html>
